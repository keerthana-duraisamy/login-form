<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <div class="max-w-[100%] h-screen">
        
        <div class="w-[95%] mx-auto flex justify-center items-center h-full">

            <div class="bg-gray-600 p-9 md:p-11 text-white space-y-7 rounded-lg">

                <h2 class="text-center text-3xl font-bold text-green-400 ">Login Form</h2>
                
                <form action="" class="flex flex-col gap-4" id="formValid">

                    <label for="" class="font-sans font-semibold">Email</label>
                    <input type="text" class="px-5 py-2 border rounded-lg text-black" id="email">
                    <p class="text-red-500" id="emailerr"></p>

                    <label for="" class="font-sans font-semibold" >Password</label>
                    <input type="password" class="px-5 py-2 border rounded-lg  text-black" id="password">
                    <p class="text-red-500" id="passerr"></p>

                    <button class="bg-green-500 p-2 font-semibold rounded-lg">Submit</button>

                </form>
            </div>
        </div>
    </div>







</body>

<script src="script.js"></script>

</html>
